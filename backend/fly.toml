# fly.toml app configuration file for trendhawk-backend

app = "trendhawk-backend"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0 # Prevents Fly from automatically creating 2 machines for HA
  processes = ["app"]

[processes]
  app = "uvicorn main:app --host 0.0.0.0 --port 8080"
  worker = "python worker.py"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpus = 1
